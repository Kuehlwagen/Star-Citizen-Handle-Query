syntax = "proto3";

option csharp_namespace = "SCHQ_Protos";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

package schq;

service SCHQ_Relations {
  rpc GetChannels (google.protobuf.Empty) returns (ChannelsReply);
  rpc SetRelation (SetRelationRequest) returns (SuccessReply);
  rpc GetRelations (ChannelRequest) returns (RelationsReply);
  rpc SyncRelations (ChannelRequest) returns (stream SyncRelationsReply);
  rpc PushWebhook(WebhookRequest) returns (SuccessReply);
}

message SuccessReply {
  bool success = 1;
  string info = 2;
}

message ChannelsReply {
  repeated ChannelInfo channels = 1;
}

message ChannelRequest {
  string channel = 1;
  string username = 2;
  string password = 3;
  string adminPassword = 4;
  google.protobuf.StringValue description = 5;
  bool private = 6;
  string discordWebhookUrl = 7;
}

message SetRelationRequest {
  string channel = 1;
  string password = 2;
  RelationInfo relation = 3;
  string username = 4;
}

message RelationsReply {
  repeated RelationInfo relations = 1;
  string info = 2;
}

message SyncRelationsReply {
  string channel = 1;
  RelationInfo relation = 2;
}

message ChannelInfo {
  string name = 1;
  google.protobuf.StringValue description = 2;
  bool private = 3;
  string discordWebhookUrl = 4;
  bool hasUsers = 5;
}

message RelationInfo {
  RelationType type = 1;
  string name = 2;
  RelationValue relation = 3;
  google.protobuf.StringValue comment = 4;
  google.protobuf.Timestamp timestamp = 5;
  optional string tag = 6;
  bool tagAdded = 7;
}

message WebhookRequest {
  string url = 1;
  string body = 2;
}

enum RelationType {
  Handle = 0;
  Organization = 1;
}

enum RelationValue {
  NotAssigned = 0;
  Friendly = 1;
  Neutral = 2;
  Bogey = 3;
  Bandit = 4;
}
